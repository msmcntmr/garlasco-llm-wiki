# yaml-language-server: $schema=./quartz/plugins/quartz-plugins.schema.json
configuration:
  pageTitle: garlasco·llm-wiki
  pageTitleSuffix: ""
  enableSPA: true
  enablePopovers: true
  analytics:
    provider: plausible
  locale: en-US
  baseUrl: msmcntmr.github.io/garlasco-llm-wiki
  ignorePatterns:
    - private
    - templates
    - .obsidian
    - .claude
    - .firecrawl
    - docs
    - raw
    - .gitignore
    - AGENTS.md
    - LLM Investigation Wiki.md
    - workflow-audit.md
    - workflow-ingest.md
    - workflow-query.md
  theme:
    fontOrigin: googleFonts
    cdnCaching: true
    typography:
      header: Cormorant Garamond
      body: Cormorant Garamond
      code: JetBrains Mono
    colors:
      lightMode:
        light: "#fbf9f5"
        lightgray: "#ece6dc"
        gray: "#8a857f"
        darkgray: "#2b2520"
        dark: "#2b2520"
        secondary: "#a8603f"
        tertiary: "#8f4f34"
        highlight: rgba(168, 96, 63, 0.10)
        textHighlight: rgba(216, 160, 90, 0.35)
      darkMode:
        light: "#211e1a"
        lightgray: "#3a352d"
        gray: "#8d8779"
        darkgray: "#ebe6dc"
        dark: "#ebe6dc"
        secondary: "#d98a55"
        tertiary: "#e6a173"
        highlight: rgba(217, 138, 85, 0.15)
        textHighlight: rgba(217, 138, 85, 0.30)
plugins:
  - source: github:quartz-community/created-modified-date
    enabled: true
    options:
      defaultDateType: modified
      priority:
        - frontmatter
        - git
        - filesystem
    order: 10
  - source: github:quartz-community/syntax-highlighting
    enabled: true
    options:
      theme:
        light: github-light
        dark: github-dark
      keepBackground: false
    order: 20
  - source: github:quartz-community/obsidian-flavored-markdown
    enabled: true
    options:
      comments: true
      highlight: true
      wikilinks: true
      callouts: true
      mermaid: true
      parseTags: true
      parseArrows: true
      parseBlockReferences: true
      enableInHtmlEmbed: false
      enableYouTubeEmbed: true
      enableVideoEmbed: true
      enableCheckbox: true
    order: 30
  - source: github:quartz-community/github-flavored-markdown
    enabled: true
    order: 40
  - source: github:quartz-community/table-of-contents
    enabled: true
    order: 50
    layout:
      position: right
      priority: 30
  - source: github:quartz-community/crawl-links
    enabled: true
    options:
      markdownLinkResolution: shortest
    order: 60
  - source: github:quartz-community/description
    enabled: true
    order: 70
  - source: github:quartz-community/latex
    enabled: true
    options:
      renderEngine: katex
    order: 80
  - source: github:quartz-community/citations
    enabled: false
    order: 85
  - source: github:quartz-community/hard-line-breaks
    enabled: true
    order: 90
  - source: github:quartz-community/ox-hugo
    enabled: false
    order: 91
  - source: github:quartz-community/roam
    enabled: false
    order: 92
  - source: github:quartz-community/fonts
    enabled: true
    options:
      title:
        name: IBM Plex Mono
        weights:
          - 400
          - 600
  - source: github:quartz-community/remove-draft
    enabled: true
  - source: github:quartz-community/explicit-publish
    enabled: false
  - source: github:quartz-community/unlisted-pages
    enabled: true
    options: {}
    order: 45
  - source: github:quartz-community/encrypted-pages
    enabled: true
    options:
      iterations: 600000
      passwordField: password
      unlistWhenEncrypted: false
      outputPath: static/encryptedContentIndex.json
  - source: github:quartz-community/stacked-pages
    enabled: false
    layout:
      position: afterBody
      priority: 50
      display: all
  - source: github:quartz-community/alias-redirects
    enabled: true
  - source: github:quartz-community/content-index
    enabled: true
    options:
      enableSiteMap: true
      enableRSS: true
  - source: github:quartz-community/favicon
    enabled: true
  - source: github:quartz-community/og-image
    enabled: true
  - source: github:quartz-community/cname
    enabled: false
  - source: github:quartz-community/canvas-page
    enabled: true
  - source: github:quartz-community/content-page
    enabled: true
  - source: github:quartz-community/folder-page
    enabled: true
  - source: github:quartz-community/tag-page
    enabled: true
  - source: github:quartz-community/explorer
    enabled: true
    options:
      folderDefaultState: open
    layout:
      position: left
      priority: 50
  - source: github:quartz-community/graph
    enabled: true
    options:
      globalGraph:
        depth: 2
        showTags: false
        fontSize: 0.25
        opacityScale: 0.5
        linkDistance: 40
    layout:
      position: right
      priority: 10
  - source: github:quartz-community/search
    enabled: true
    layout:
      position: left
      priority: 20
      group: toolbar
      groupOptions:
        grow: true
  - source: github:quartz-community/backlinks
    enabled: true
    layout:
      position: right
      priority: 50
  - source: github:quartz-community/article-title
    enabled: true
    layout:
      position: beforeBody
      priority: 10
  - source: github:quartz-community/content-meta
    enabled: true
    layout:
      position: beforeBody
      priority: 20
  - source: github:quartz-community/tag-list
    enabled: false
    layout:
      position: beforeBody
      priority: 30
  - source: github:quartz-community/page-title
    enabled: true
    layout:
      position: left
      priority: 10
  - source: github:quartz-community/darkmode
    enabled: true
    layout:
      position: left
      priority: 30
      group: toolbar
  - source: github:quartz-community/reader-mode
    enabled: true
    layout:
      position: left
      priority: 35
      group: toolbar
  - source: github:quartz-community/breadcrumbs
    enabled: true
    layout:
      position: beforeBody
      priority: 5
      condition: not-index
  - source: github:quartz-community/comments
    enabled: false
    options:
      provider: giscus
      options: {}
    layout:
      position: afterBody
      priority: 10
  - source: github:quartz-community/recent-notes
    enabled: false
  - source: github:quartz-community/spacer
    enabled: true
    options: {}
    order: 25
    layout:
      position: left
      priority: 25
      display: mobile-only
  - source: github:quartz-community/bases-page
    enabled: true
    options: {}
    order: 50
  - source: github:quartz-community/note-properties
    enabled: true
    options:
      includeAll: true
      includedProperties:
        - tags
        - status
        - confidence
        - priority
        - last_updated
        - last_updated_note
        - description
        - aliases
      excludedProperties: []
      hidePropertiesView: false
      delimiters: ---
      language: yaml
    order: 5
    layout:
      position: beforeBody
      priority: 15
      display: all
  - source:
      name: quartz-themes
      repo: github:saberzero1/quartz-themes
      subdir: plugin
    enabled: false
    options:
      theme: default
  - source: github:quartz-community/obsidian-plugin-excalidraw
    enabled: true
    options:
      enableInteraction: true
      darkMode: auto
      exportPadding: 20
    order: 50
  # Local fork of github:quartz-community/footer adding a "Last update" line
  # with the build timestamp and vault commit SHA — see local-plugins/footer/
  - source: ./local-plugins/footer
    enabled: true
    options:
      links: {}
    order: 50
  # Toggleable "In aggiornamento" top status bar — see local-plugins/update-banner/
  # To turn it off: set enabled to false. To change the copy: edit options below.
  # Must stay on afterBody, not beforeBody: that slot is wrapped in
  # .popover-hint, which the link-hover-preview popover clones into every
  # preview box (see UpdateBanner.tsx for the full explanation).
  - source: ./local-plugins/update-banner
    enabled: true
    options:
      badge: "In aggiornamento"
      text: "Il periodo tra il 2007 e il 2016 è completo — l'ingest del 2017 è tuttora in corso. Le informazioni più recenti potrebbero essere del tutto mancanti."
    layout:
      position: afterBody
      priority: 1
layout:
  groups:
    toolbar:
      priority: 35
      direction: row
      gap: 0.5rem
  byPageType:
    "404":
      positions:
        beforeBody: []
        left: []
        right: []
    content: {}
    folder:
      exclude:
        - reader-mode
      positions:
        right: []
    tag:
      exclude:
        - reader-mode
      positions:
        right: []
    canvas: {}
    bases: {}
