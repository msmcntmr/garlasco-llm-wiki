name: Deploy to GitHub Pages

on:
  push:
    branches: [v5]
  repository_dispatch:
    types: [vault-updated]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  build-deploy:
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Checkout Quartz
        uses: actions/checkout@v7

      - name: Checkout vault content (private)
        uses: actions/checkout@v7
        with:
          repository: msmcntmr/garlasco-obsidian-vault
          token: ${{ secrets.VAULT_TOKEN }}
          path: content

      - name: Record vault commit SHA
        id: vault_sha
        run: echo "sha=$(git -C content rev-parse --short HEAD)" >> "$GITHUB_OUTPUT"

      - name: Setup Node
        uses: actions/setup-node@v6
        with:
          node-version: 22

      - name: Cache dependencies
        uses: actions/cache@v6
        with:
          path: ~/.npm
          key: ${{ runner.os }}-node-${{ hashFiles('**/package-lock.json') }}
          restore-keys: |
            ${{ runner.os }}-node-

      - name: Cache Quartz plugins
        uses: actions/cache@v6
        with:
          path: .quartz/plugins
          key: ${{ runner.os }}-plugins-${{ hashFiles('quartz.lock.json') }}
          restore-keys: |
            ${{ runner.os }}-plugins-

      - run: npm ci

      - name: Install Quartz plugins
        # --from-config re-resolves the local-plugins/footer path against this
        # runner's checkout instead of trusting the absolute path baked into
        # quartz.lock.json by the machine that last ran `plugin add`/`install`.
        run: npx quartz plugin install --from-config

      - name: Build Quartz
        run: npx quartz build
        env:
          QUARTZ_VAULT_SHA: ${{ steps.vault_sha.outputs.sha }}

      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v5
        with:
          path: public

      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v5
